# Builds the Windows installer and publishes it to a GitHub Release
# whenever a version tag is pushed (e.g. v1.0.0). This is also what
# generates the release feed electron-updater checks on every launch
# (Phase 8) — see README.md's "Cutting a release" section before using
# this the first time.
name: Build and Release

on:
  push:
    tags:
      - 'v*.*.*'

# Needed so the default GITHUB_TOKEN is allowed to create/upload release
# assets — without this, electron-builder's publish step fails with a
# permissions error.
permissions:
  contents: write

jobs:
  build:
    runs-on: windows-latest

    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci

      - name: Fetch yt-dlp and ffmpeg
        run: npm run setup
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Run automated tests
        run: npm test

      - name: Build and publish the installer
        run: npm run dist -- --publish always
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
